<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Grok Database</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Grok 聊天紀錄</h1>

<input id="input_title" placeholder="標題"><br><br>
<input id="input_category" placeholder="類別"><br><br>
<input id="input_summary" placeholder="摘要"><br><br>
<button id="add_note_btn">新增紀錄</button>

<hr>

<h2>聊天紀錄列表</h2>
<div id="note_list"></div>




<div id="detail_panel" class="panel">
  <h2>詳細聊天紀錄</h2>

  <input id="detail_title" placeholder="標題"><br><br>
  <input id="detail_category" placeholder="類別"><br><br>
  <input id="detail_summary" placeholder="摘要"><br><br>

  <button id="save_btn">儲存修改</button>
  <button id="close_btn">關閉</button>
</div>

<script type="module" src="script.js"></script>

</body>
</html>
